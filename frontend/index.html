<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
<title>Remote Touchpad</title>
<script src="iconfont/iconfont.js"></script>
<style>
.icon { width:1em; height:1em; vertical-align:-0.15em; fill:currentColor; overflow:hidden; }
</style>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
  <div id="topbar">
    <div id="status" class="err">连接中...</div>
    <div id="topbar-btns">
      <button id="ime-refresh-btn" class="top-btn" aria-label="刷新输入法状态" onclick="refreshIme()">
        <span style="font-size:14px">↻</span>
      </button>
      <button id="fk-toggle" class="top-btn active" aria-label="功能键" onclick="toggleFk()">
        <span style="font-size:11px;font-weight:700">Fn</span>
      </button>
      <button id="kb-btn" class="top-btn" aria-label="键盘" onclick="toggleKb()">
        <svg class="icon" id="kb-icon"><use xlink:href="#icon-danchujianpan"></use></svg>
      </button>
    </div>
  </div>

  <div id="main">
    <div id="fk-panel">
      <div class="fk-group">
        <button class="fk" data-key="Escape">ESC</button>
        <button class="fk" data-key="Tab">Tab</button>
        <button class="fk" data-key="Delete">DEL</button>
      </div>
      <div class="fk-group">
        <button class="fk arrow" data-key="Up">↑</button>
        <div class="arrow-row">
          <button class="fk arrow" data-key="Left">←</button>
          <button class="fk arrow" data-key="Down">↓</button>
          <button class="fk arrow" data-key="Right">→</button>
        </div>
      </div>
      <div class="fk-group">
        <button class="fk mod" data-mod="ctrl">Ctrl</button>
        <button class="fk mod" data-mod="shift">Shift</button>
        <button class="fk mod" data-mod="alt">Alt</button>
      </div>
      <div class="fk-group combo-group">
        <button class="fk combo" data-key="ctrl+c">C</button>
        <button class="fk combo" data-key="ctrl+v">V</button>
        <button class="fk combo" data-key="ctrl+x">X</button>
        <button class="fk combo" data-key="ctrl+z">Z</button>
        <button class="fk combo" data-key="ctrl+a">A</button>
        <button class="fk combo" data-key="ctrl+s">S</button>
      </div>
    </div>

    <div id="right">
      <div id="touchpad">
        <div class="hint">触控板</div>
        <div id="scroll-tag"><svg class="icon" id="scroll-icon"><use xlink:href=""></use></svg><span id="scroll-text"></span></div>
      </div>

      <div id="osk" class="hidden fk-open">
        <!-- Pinyin candidate bar -->
        <div id="pinyin-bar" class="hidden">
          <span id="pinyin-input"></span>
          <div id="pinyin-candidates"></div>
        </div>
        <!-- Letter layer -->
        <div class="osk-layer" data-layer="alpha">
          <div class="osk-row">
            <button class="osk-key" data-k="q">q</button>
            <button class="osk-key" data-k="w">w</button>
            <button class="osk-key" data-k="e">e</button>
            <button class="osk-key" data-k="r">r</button>
            <button class="osk-key" data-k="t">t</button>
            <button class="osk-key" data-k="y">y</button>
            <button class="osk-key" data-k="u">u</button>
            <button class="osk-key" data-k="i">i</button>
            <button class="osk-key" data-k="o">o</button>
            <button class="osk-key" data-k="p">p</button>
          </div>
          <div class="osk-row">
            <div class="osk-spacer-05"></div>
            <button class="osk-key" data-k="a">a</button>
            <button class="osk-key" data-k="s">s</button>
            <button class="osk-key" data-k="d">d</button>
            <button class="osk-key" data-k="f">f</button>
            <button class="osk-key" data-k="g">g</button>
            <button class="osk-key" data-k="h">h</button>
            <button class="osk-key" data-k="j">j</button>
            <button class="osk-key" data-k="k">k</button>
            <button class="osk-key" data-k="l">l</button>
            <div class="osk-spacer-05"></div>
          </div>
          <div class="osk-row">
            <button class="osk-key osk-mod osk-wide" data-action="shift">⇧</button>
            <button class="osk-key" data-k="z">z</button>
            <button class="osk-key" data-k="x">x</button>
            <button class="osk-key" data-k="c">c</button>
            <button class="osk-key" data-k="v">v</button>
            <button class="osk-key" data-k="b">b</button>
            <button class="osk-key" data-k="n">n</button>
            <button class="osk-key" data-k="m">m</button>
            <button class="osk-key osk-mod osk-wide" data-action="backspace">⌫</button>
          </div>
          <div class="osk-row">
            <button class="osk-key osk-mod" data-action="sym">?123</button>
            <button class="osk-key osk-mod" data-action="lang">中/EN</button>
            <button class="osk-key osk-space" data-action="space">space</button>
            <button class="osk-key osk-mod" data-action="comma">,</button>
            <button class="osk-key osk-mod" data-action="period">.</button>
            <button class="osk-key osk-mod" data-action="return">⏎</button>
          </div>
        </div>

        <!-- Symbol layer -->
        <div class="osk-layer" data-layer="sym" style="display:none">
          <div class="osk-row">
            <button class="osk-key" data-k="1">1</button>
            <button class="osk-key" data-k="2">2</button>
            <button class="osk-key" data-k="3">3</button>
            <button class="osk-key" data-k="4">4</button>
            <button class="osk-key" data-k="5">5</button>
            <button class="osk-key" data-k="6">6</button>
            <button class="osk-key" data-k="7">7</button>
            <button class="osk-key" data-k="8">8</button>
            <button class="osk-key" data-k="9">9</button>
            <button class="osk-key" data-k="0">0</button>
          </div>
          <div class="osk-row">
            <button class="osk-key" data-k="shift+1">!</button>
            <button class="osk-key" data-k="shift+2">@</button>
            <button class="osk-key" data-k="shift+3">#</button>
            <button class="osk-key" data-k="shift+4">$</button>
            <button class="osk-key" data-k="shift+5">%</button>
            <button class="osk-key" data-k="shift+6">^</button>
            <button class="osk-key" data-k="shift+7">&amp;</button>
            <button class="osk-key" data-k="shift+8">*</button>
            <button class="osk-key" data-k="shift+9">(</button>
            <button class="osk-key" data-k="shift+0">)</button>
          </div>
          <div class="osk-row">
            <button class="osk-key" data-k="`">`</button>
            <button class="osk-key" data-k="-">-</button>
            <button class="osk-key" data-k="=">=</button>
            <button class="osk-key" data-k="[">[</button>
            <button class="osk-key" data-k="]">]</button>
            <button class="osk-key" data-k=";">;</button>
            <button class="osk-key" data-k="'">'</button>
            <button class="osk-key" data-k="shift+`">~</button>
            <button class="osk-key" data-k="\\">\\</button>
            <button class="osk-key osk-mod osk-wide" data-action="backspace">⌫</button>
          </div>
          <div class="osk-row">
            <button class="osk-key osk-mod" data-action="sym">ABC</button>
            <button class="osk-key" data-k=",">,</button>
            <button class="osk-key" data-k=".">.</button>
            <button class="osk-key" data-k="/">/</button>
            <button class="osk-key" data-k="shift+\\">|</button>
            <button class="osk-key" data-k="shift+;">:</button>
            <button class="osk-key" data-k="shift+'">"</button>
            <button class="osk-key" data-k="shift+,">&lt;</button>
            <button class="osk-key" data-k="shift+.">&gt;</button>
            <button class="osk-key osk-mod" data-action="return">⏎</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="sent">已发送</div>
<!-- Hidden textarea for proot Chinese IME composition -->
<textarea id="txt" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>

<!-- Approval overlay -->
<div id="approval-overlay">
  <div id="approval-modal">
    <h3>新设备请求连接</h3>
    <p id="approval-info">有设备正在尝试接管控制权</p>
    <div class="approval-btns">
      <button id="btn-reject" onclick="approvalResp('reject')">拒绝</button>
      <button id="btn-accept" onclick="approvalResp('accept')">同意</button>
    </div>
  </div>
</div>

<!-- Auth overlay -->
<div id="auth-overlay">
  <div id="auth-modal">
    <h3>输入配对码</h3>
    <p>请在电脑端查看配对码</p>
    <input id="auth-pin" type="tel" maxlength="6" placeholder="------" autocomplete="off" inputmode="numeric">
    <div id="auth-error"></div>
    <button id="auth-submit" onclick="submitAuth()">连接</button>
  </div>
</div>

<script src="pinyin-dict.js"></script>
<script src="app.js"></script>
</body>
</html>
