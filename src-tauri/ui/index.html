<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Remote Touchpad</title>
<script src="iconfont/iconfont.js"></script>
<style>
.icon{width:1em;height:1em;vertical-align:-0.15em;fill:currentColor;overflow:hidden}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f1117;color:#c9d1d9;font-family:-apple-system,system-ui,sans-serif;
  display:flex;flex-direction:column;align-items:center;padding:12px 20px 20px;gap:14px;
  min-height:100vh}

.titlebar{display:flex;align-items:center;justify-content:space-between;
  width:100%;height:36px;padding:0 4px;-webkit-user-select:none;user-select:none;
  flex-shrink:0}
.titlebar-left{display:flex;align-items:center;gap:8px}
.titlebar-icon{flex-shrink:0}
.titlebar-title{font-size:13px;color:#8b949e;font-weight:500}
.titlebar-controls{display:flex;gap:2px}
.titlebar-btn{width:36px;height:28px;border:none;background:transparent;
  color:#8b949e;display:flex;align-items:center;justify-content:center;
  cursor:pointer;border-radius:4px;transition:all .15s}
.titlebar-btn:hover{background:#21262d;color:#c9d1d9}
.titlebar-btn.btn-close:hover{background:#da3633;color:#fff}

.panel{background:#161b22;border:1px solid #21262d;border-radius:12px;padding:14px;
  width:100%;max-width:360px}

.port-row{display:flex;align-items:center;gap:10px}
.port-row label{font-size:13px;color:#8b949e}
.port-row input{width:72px;padding:6px 8px;border:1px solid #30363d;border-radius:6px;
  background:#0d1117;color:#c9d1d9;font-size:13px;text-align:center;outline:none}
.port-row input:focus{border-color:#238636}
.port-row input:disabled{opacity:.4}
#toggle-btn{flex:1;padding:9px;border:none;border-radius:8px;font-size:13px;
  font-weight:600;cursor:pointer;background:#238636;color:#fff;transition:all .15s}
#toggle-btn:hover{background:#2ea043}
#toggle-btn:active{transform:scale(.97)}
#toggle-btn.running{background:#da3633}
#toggle-btn.running:hover{background:#f85149}

#info{text-align:center;font-size:12px;color:#3fb950;min-height:18px;
  cursor:pointer;margin-top:6px;word-break:break-all}
#info:hover{text-decoration:underline}
#hint{text-align:center;font-size:11px;color:#484f58;min-height:14px}

#qr-box{display:flex;justify-content:center;min-height:140px;align-items:center}
#qr-box svg{max-width:140px;max-height:140px}
#qr-placeholder{color:#30363d;font-size:12px}

.device-status{display:flex;align-items:center;gap:10px;padding:10px 12px}
.status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;transition:all .3s}
.status-dot.off{background:#21262d}
.status-dot.on{background:#3fb950;box-shadow:0 0 8px rgba(63,185,80,.3)}
.status-text{font-size:13px;color:#8b949e}
.status-text .device-name{color:#f0f6fc;font-weight:500}

#pin-box{display:none;text-align:center;padding:4px 0}
#pin-box.show{display:block}
.pin-label{font-size:11px;color:#8b949e;margin-bottom:4px}
.pin-code{font-size:28px;font-weight:700;color:#3fb950;
  letter-spacing:6px;font-family:Consolas,monospace}

.copied{position:fixed;top:10px;left:50%;transform:translateX(-50%);
  background:#238636;color:#fff;padding:4px 16px;border-radius:16px;
  font-size:12px;font-weight:600;opacity:0;transition:opacity .2s;pointer-events:none;z-index:100}
.copied.show{opacity:1}

/* ─── IME Settings Panel ──────────────────────────── */
.ime-title{font-size:13px;font-weight:600;color:#c9d1d9;margin-bottom:4px}
.ime-hint{font-size:11px;color:#484f58;margin-bottom:10px;line-height:1.4}
.ime-presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.ime-preset{padding:6px 12px;border:1px solid #30363d;border-radius:6px;
  background:#0d1117;color:#8b949e;font-size:12px;font-weight:500;
  cursor:pointer;transition:all .15s;touch-action:manipulation}
.ime-preset:hover{border-color:#58a6ff;color:#c9d1d9}
.ime-preset.active{background:#238636;border-color:#2ea043;color:#fff}
.ime-custom-row{display:flex;gap:8px;align-items:center}
#ime-custom-input{flex:1;padding:6px 8px;border:1px solid #30363d;border-radius:6px;
  background:#0d1117;color:#c9d1d9;font-size:12px;outline:none}
#ime-custom-input:focus{border-color:#238636}
#ime-save-btn{padding:6px 14px;border:none;border-radius:6px;
  background:#238636;color:#fff;font-size:12px;font-weight:600;cursor:pointer;
  transition:all .15s}
#ime-save-btn:hover{background:#2ea043}
#ime-save-btn:active{transform:scale(.97)}
#ime-save-status{font-size:11px;min-height:16px;margin-top:4px;transition:opacity .2s}
</style>
</head>
<body>
<!-- 自定义标题栏 -->
<div class="titlebar" data-tauri-drag-region>
  <div class="titlebar-left" data-tauri-drag-region>
    <svg class="titlebar-icon" viewBox="0 0 1024 1024" width="20" height="20" style="color:#58a6ff"><use xlink:href="#icon-chukongban"></use></svg>
    <span class="titlebar-title" data-tauri-drag-region>Remote Touchpad</span>
  </div>
  <div class="titlebar-controls">
    <button class="titlebar-btn" id="btn-minimize" title="最小化">
      <svg width="10" height="1" viewBox="0 0 10 1"><path d="M0 0h10v1H0z" fill="currentColor"/></svg>
    </button>
    <button class="titlebar-btn" id="btn-maximize" title="最大化">
      <svg width="10" height="10" viewBox="0 0 10 10"><rect x="0.5" y="0.5" width="9" height="9" stroke="currentColor" fill="none"/></svg>
    </button>
    <button class="titlebar-btn btn-close" id="btn-close" title="关闭">
      <svg width="10" height="10" viewBox="0 0 10 10"><path d="M1 0L0 1l4 4-4 4 1 1 4-4 4 4 1-1-4-4 4-4-1-1-4 4z" fill="currentColor"/></svg>
    </button>
  </div>
</div>

<h1 style="font-size:17px;color:#3fb950;font-weight:600;display:flex;align-items:center"><svg class="icon" style="width:36px;height:36px;margin-right:8px;color:#58a6ff"><use xlink:href="#icon-chukongban"></use></svg>Remote Touchpad</h1>

<div class="panel">
  <div class="port-row">
    <label>端口</label>
    <input id="port-input" type="number" value="8765" min="1" max="65535">
    <button id="toggle-btn">启动</button>
  </div>
  <div id="info"></div>
  <div id="hint"></div>
</div>

<div class="panel">
  <div id="qr-box"><span id="qr-placeholder">启动后显示二维码</span></div>
  <div id="pin-box">
    <div class="pin-label">配对码</div>
    <div class="pin-code" id="pin-code">------</div>
  </div>
</div>

<div class="panel">
  <div class="device-status">
    <div class="status-dot off" id="status-dot"></div>
    <div class="status-text" id="status-text">等待连接...</div>
  </div>
</div>

<div class="panel" id="ime-panel">
  <div class="ime-title">输入法切换快捷键</div>
  <div class="ime-hint">当手机端"中/EN"键不起作用时，配置适合你电脑的快捷键</div>
  <div class="ime-presets" id="ime-presets">
    <button class="ime-preset" data-key="">默认</button>
    <button class="ime-preset" data-key="shift">Shift</button>
    <button class="ime-preset" data-key="ctrl+space">Ctrl+Space</button>
    <button class="ime-preset" data-key="Caps_Lock">CapsLock</button>
  </div>
  <div class="ime-custom-row">
    <input id="ime-custom-input" type="text" placeholder="自定义，如 ctrl+shift" autocomplete="off">
    <button id="ime-save-btn">保存</button>
  </div>
  <div id="ime-save-status"></div>
</div>

<div class="copied" id="copied-toast">已复制</div>

<script>
const infoEl = document.getElementById('info');
const portInput = document.getElementById('port-input');
const toggleBtn = document.getElementById('toggle-btn');
const hintEl = document.getElementById('hint');
const qrBox = document.getElementById('qr-box');
const copiedToast = document.getElementById('copied-toast');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');

let invoke, running = false, pollTimer = null, deviceConnected = false;

try {
  if (window.__TAURI__ && window.__TAURI__.core) {
    invoke = window.__TAURI__.core.invoke;
  } else if (window.__TAURI_INTERNALS__) {
    invoke = (cmd, args) => window.__TAURI_INTERNALS__.invoke(cmd, args);
  }
  if (invoke) infoEl.textContent = '就绪';
} catch (e) {
  infoEl.textContent = '初始化失败: ' + e;
  infoEl.style.color = '#f85149';
}

toggleBtn.addEventListener('click', async () => {
  if (!invoke) { infoEl.textContent = '未初始化'; return; }
  if (!running) {
    const port = parseInt(portInput.value);
    if (port < 1 || port > 65535) { infoEl.textContent = '端口无效'; return; }
    infoEl.textContent = '启动中...';
    infoEl.style.color = '#3fb950';
    try {
      const status = await Promise.race([
        invoke('start_server_cmd', { port }),
        new Promise((_, rej) => setTimeout(() => rej(new Error('超时')), 15000))
      ]);
      onStarted(status);
    } catch (e) {
      infoEl.textContent = e.message || String(e);
      infoEl.style.color = '#f85149';
    }
  } else {
    try { await invoke('stop_server_cmd'); onStopped(); }
    catch (e) { infoEl.textContent = typeof e === 'object' ? JSON.stringify(e) : e; }
  }
});

function onStarted(status) {
  running = true;
  toggleBtn.textContent = '停止';
  toggleBtn.classList.add('running');
  portInput.disabled = true;
  infoEl.textContent = status.url;
  infoEl.style.color = '#3fb950';
  hintEl.textContent = '扫码或输入地址连接';
  qrBox.innerHTML = status.qr_svg;
  if (status.pin) {
    document.getElementById('pin-code').textContent = status.pin;
    document.getElementById('pin-box').classList.add('show');
  }
  setStatus('idle');
  pollTimer = setInterval(pollStatus, 2000);
}

function onStopped() {
  running = false; deviceConnected = false;
  toggleBtn.textContent = '启动';
  toggleBtn.classList.remove('running');
  portInput.disabled = false;
  infoEl.textContent = '已停止';
  infoEl.style.color = '#3fb950';
  hintEl.textContent = '';
  qrBox.innerHTML = '<span id="qr-placeholder">启动后显示二维码</span>';
  document.getElementById('pin-box').classList.remove('show');
  setStatus('off');
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

function setStatus(state, name) {
  statusDot.className = 'status-dot';
  if (state === 'connected') {
    statusDot.classList.add('on');
    statusText.innerHTML = '<span class="device-name">' + escHtml(name||'设备') + '</span> 已连接';
    deviceConnected = true;
  } else {
    statusDot.classList.add('off');
    statusText.textContent = state === 'off' ? '未启动' : '等待连接...';
    deviceConnected = false;
  }
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function pollStatus() {
  try {
    const status = await invoke('get_status');
    if (!status.running) { onStopped(); return; }
    if (status.device_name) setStatus('connected', status.device_name);
    else if (deviceConnected) setStatus('idle');
    if (status.pin) document.getElementById('pin-code').textContent = status.pin;
  } catch (e) {}
}

infoEl.addEventListener('click', () => {
  const text = infoEl.textContent;
  if (text && text.includes('http')) {
    navigator.clipboard.writeText(text);
    copiedToast.classList.add('show');
    setTimeout(() => copiedToast.classList.remove('show'), 1000);
  }
});

if (invoke) {
  invoke('get_status').then(s => { if (s.running) onStarted(s); }).catch(() => {});
}

// ─── IME Config ─────────────────────────────────────
const imePresets = document.getElementById('ime-presets');
const imeCustomInput = document.getElementById('ime-custom-input');
const imeSaveBtn = document.getElementById('ime-save-btn');
const imeSaveStatus = document.getElementById('ime-save-status');
let currentImeKey = null;

async function loadImeConfig() {
  if (!invoke) return;
  try {
    const cfg = await invoke('get_ime_config');
    currentImeKey = cfg.ime_toggle_key || '';
    updateImeUI();
  } catch (e) {
    console.warn('Failed to load IME config:', e);
  }
}

function updateImeUI() {
  // Update preset button states
  document.querySelectorAll('.ime-preset').forEach(btn => {
    const isActive = btn.dataset.key === currentImeKey;
    btn.classList.toggle('active', isActive);
  });
  // Update custom input
  const isPreset = ['', 'shift', 'ctrl+space', 'Caps_Lock'].includes(currentImeKey);
  if (!isPreset && currentImeKey) {
    imeCustomInput.value = currentImeKey;
  } else {
    imeCustomInput.value = '';
  }
}

// Preset button clicks
document.querySelectorAll('.ime-preset').forEach(btn => {
  btn.addEventListener('click', () => {
    currentImeKey = btn.dataset.key;
    updateImeUI();
  });
});

// Save button
imeSaveBtn.addEventListener('click', async () => {
  if (!invoke) return;
  // If custom input has value, use it; otherwise use the selected preset
  const customVal = imeCustomInput.value.trim();
  const keyToSave = customVal || currentImeKey || null;
  try {
    await invoke('save_ime_config', { ime_toggle_key: keyToSave || null });
    currentImeKey = keyToSave || '';
    updateImeUI();
    imeSaveStatus.textContent = '✓ 已保存（下次启动服务生效）';
    imeSaveStatus.style.color = '#3fb950';
    setTimeout(() => { imeSaveStatus.textContent = ''; }, 3000);
  } catch (e) {
    imeSaveStatus.textContent = '保存失败: ' + e;
    imeSaveStatus.style.color = '#f85149';
  }
});

// Load config on startup
loadImeConfig();

// 窗口控制按钮
async function windowCmd(cmd) {
  try {
    await window.__TAURI_INTERNALS__.invoke('plugin:window|' + cmd);
  } catch (e) {
    try { await window.__TAURI_INTERNALS__.invoke(cmd); } catch (_) {}
  }
}
document.getElementById('btn-minimize').addEventListener('click', () => windowCmd('minimize'));
document.getElementById('btn-maximize').addEventListener('click', () => windowCmd('toggle_maximize'));
document.getElementById('btn-close').addEventListener('click', () => windowCmd('close'));
</script>
</body>
</html>
